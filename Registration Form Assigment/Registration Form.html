<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>
    <h1>Registration Form</h1>  
<form>
    <label>First Name:*</label>
    <input type = "text" name =First Name>
    <br><br>
    <label>Last Name:*</label>
    <input type = "text" name =Last Name>
    <br><br>
    <label>Email Address:*</label>
    <input type = "text" name =Email Address>
    <br><br>
    <label>Password:*</label>
    <input type = "password" name =password>
    <br><br>
    <label>Confirm Password:*</label>
    <input type = "password" name =confirm password>
    <br><br>
    <label>Birthday:</label>
    <input type = "date" name =birthday>
    <br><br>
    <label>Gender Identity:</label>
    <br>
    <input type ="radio" name= "gender"> Male
    <input type ="radio" name= "gender"> Female
    <input type ="radio" name= "gender"> Non-binary
    <input type ="radio" name= "gender"> I Prefer not to answer
    <br><br>
    <label> A short description about myself:</label>
    <textarea rows="5" cols="40"></textarea>
    <br><br>
    <label> Favorite Language:</label>
    <select>
        <option>JavaScript</option>
        <option>Python</option>
        <option>Java</option>
        <option>C++</option>
    </select>
    <br><br>
    <input type = "checkbox"> Yes, I would like to receive periodic email updates
    <br><br>
    <input type="submit" value="Create Account">
    <br><br>

    <label> * Indicates a required field</label>

</form>

</body>
</html>
